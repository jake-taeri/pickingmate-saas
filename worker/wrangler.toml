name = "pickingmate-saas-proxy"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# KV 네임스페이스 바인딩
# 새 KV 생성: wrangler kv:namespace create PICKINGMATE_KV
# 생성 후 아래 id를 출력된 값으로 교체
[[kv_namespaces]]
binding = "PICKINGMATE_KV"
id = "ed4f091777ea4b1eb7f14105d0fb7785"

# 아래 시크릿은 배포 후 다음 명령으로 설정:
#   wrangler secret put CAFE24_CLIENT_ID      (카페24 앱스토어 Client ID)
#   wrangler secret put CAFE24_CLIENT_SECRET  (카페24 앱스토어 Client Secret)
#   wrangler secret put CLAUDE_API_KEY        (Anthropic API Key)
#   wrangler secret put ADMIN_SECRET          (테넌트 등록용 관리자 비밀키)
